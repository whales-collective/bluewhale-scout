name: Build, Push and Scan with Docker Scout

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  IMAGE_NAME: bluewhale/little-go-web-app
  WORKING_DIRECTORY: ./01-little-go-web-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push-scan:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.9.0

      - name: Login to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: |
          TAG=${{ github.ref }}
          # Extract version from refs/tags/vX.X.X
          VERSION=${TAG#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG#refs/tags/}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.11.0
        with:
          context: ${{ env.WORKING_DIRECTORY }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker Scout vulnerability scan
        uses: docker/scout-action@v1.18.0
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          sarif-file: scout-results.sarif
          write-comment: false

      - name: Upload Scout SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: scout-results.sarif
          category: docker-scout

      - name: Run Docker Scout CVE report to console
        uses: docker/scout-action@v1.18.0
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          write-comment: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            # Release ${{ steps.version.outputs.tag }}

            ## Docker Image Published

            This release publishes the Docker image to Docker Hub:

            **Organization:** bluewhale
            **Image:** ${{ env.IMAGE_NAME }}
            **Version:** ${{ steps.version.outputs.version }}
            **Tags:**
            - `${{ steps.version.outputs.version }}`
            - `latest`

            ## Security Scan

            This image has been scanned with Docker Scout for vulnerabilities.
            See the Security tab for detailed scan results.

            ## Docker Hub Link

            https://hub.docker.com/r/${{ env.IMAGE_NAME }}/tags?name=${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
